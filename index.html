/* 新消息弹窗 */
.message-notification {
    position: fixed;
    top: 70px;
    left: 50%;
    transform: translateX(-50%);
    width: calc(100% - 32px);
    max-width: 450px;
    background: rgba(255, 255, 255, 0.95);
    backdrop-filter: blur(10px);
    border-radius: 16px;
    padding: 12px 16px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    z-index: 300;
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    animation: slideDown 0.3s ease-out;
    border: 1px solid rgba(232, 93, 117, 0.3);
}
@keyframes slideDown {
    from {
        opacity: 0;
        transform: translateX(-50%) translateY(-20px);
    }
    to {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
    }
}

            <div style="display:flex;gap:12px;margin-top:12px;">

    `;

    document.body.appendChild(modal);

    // ===== 切换箭头事件 =====
    document.getElementById("gachaArrowLeft").addEventListener("click", function(e) {
        e.stopPropagation();
        switchGachaMachine('left');
    });
    document.getElementById("gachaArrowRight").addEventListener("click", function(e) {
        e.stopPropagation();
        switchGachaMachine('right');
    });

    // 箭头悬停效果
    document.querySelectorAll(".gacha-arrow").forEach(el => {
        el.addEventListener("mouseenter", function() {
            this.style.background = "#F0EEEE";
        });
        el.addEventListener("mouseleave", function() {
            this.style.background = "transparent";
            // ===== 加载选中的卡套并更新标签 =====
loadSelectedCardSet();
        });
    });

    // ===== 手机摇晃检测 =====
    var shakeCount = 0;
    var lastShakeTime = 0;
    var shakeThreshold = 15;

    function handleShake(acceleration) {
        var now = Date.now();
        if (now - lastShakeTime < 300) return;

        var x = acceleration.x || 0;
        var y = acceleration.y || 0;
        var z = acceleration.z || 0;
        var magnitude = Math.sqrt(x * x + y * y + z * z);

        if (magnitude > shakeThreshold) {
            shakeCount++;
            lastShakeTime = now;

            // 摇晃3次触发扭蛋
            if (shakeCount >= 3) {
                shakeCount = 0;
                if (!isSpinning) {
                    spinGacha();
                }
            }
        }
    }

    // 检查是否支持 DeviceMotion API
    if (window.DeviceMotionEvent) {
        // 针对 iOS 13+ 需要请求权限
        if (typeof DeviceMotionEvent.requestPermission === 'function') {
            DeviceMotionEvent.requestPermission().then(function(state) {
                if (state === 'granted') {
                    window.addEventListener('devicemotion', handleShake);
                }
            }).catch(function(err) {
                console.log('摇一摇权限被拒绝:', err);
            });
        } else {
            window.addEventListener('devicemotion', handleShake);
        }
    }

    // ===== 扭蛋机抽奖 =====
    window.spinGacha = function() {
        if (isSpinning) return;
        isSpinning = true;

        var machine = document.getElementById("gachaMachine");
        var knob = document.getElementById("gachaKnob");
        var balls = document.getElementById("ballsContainer");
        var droppedEgg = document.getElementById("droppedEgg");
        var hint = document.getElementById("gachaHint");

        if (!machine) return;

        machine.style.pointerEvents = "none";
        if (knob) knob.style.pointerEvents = "none";
        if (hint) hint.innerText = "🔄 扭蛋机转动中...";

        // 旋钮旋转
        if (knob) {
            knob.style.transition = "transform 0.1s";
            var rotateCount = 0;
            var rotateInterval = setInterval(function() {
                rotateCount += 30;
                knob.style.transform = "rotate(" + rotateCount + "deg) scale(0.9)";
                if (rotateCount >= 360) {
                    clearInterval(rotateInterval);
                    knob.style.transform = "rotate(0deg) scale(1)";
                }
            }, 60);
        }

        // 摇晃动画
        var shakeCount2 = 0;
        var shakeInterval = setInterval(function() {
            var offset = Math.sin(shakeCount2 * 0.8) * 3;
            machine.style.transform = "rotate(" + offset + "deg)";
            if (balls) {
                balls.style.transform = "translateX(" + (Math.random() * 8 - 4) + "px) translateY(" + (Math.random() * 6 - 3) + "px)";
            }
            shakeCount2++;
            if (shakeCount2 > 20) {
                clearInterval(shakeInterval);
                machine.style.transform = "rotate(0deg)";
                if (balls) balls.style.transform = "translateX(0) translateY(0)";
                dropEgg();
            }
        }, 80);

        function dropEgg() {
            // 掉落的蛋随机颜色
            var eggEmojis = ["🔴", "🔵", "🟡", "🟢", "🟣", "🟠"];
            var eggEmoji = eggEmojis[Math.floor(Math.random() * eggEmojis.length)];
            droppedEgg.style.fontSize = "0px";
            droppedEgg.style.transform = "scale(0) translateY(-30px)";
            droppedEgg.innerText = eggEmoji;

            setTimeout(function() {
                droppedEgg.style.fontSize = "44px";
                droppedEgg.style.transform = "scale(1) translateY(0px)";
                if (hint) hint.innerText = "🎉 扭蛋出来了！";

                setTimeout(function() {
                    showGachaResultModal();
                }, 500);
            }, 300);
        }
    };

    // ===== 关闭弹窗时移除摇晃监听 =====
    var closeBtn = modal.querySelector('button');
    if (closeBtn) {
        closeBtn.onclick = function() {
            if (window.DeviceMotionEvent) {
                window.removeEventListener('devicemotion', handleShake);
            }
            modal.remove();
        };
    }

    modal.addEventListener("click", function(e) {
        if (e.target === modal) {
            if (window.DeviceMotionEvent) {
                window.removeEventListener('devicemotion', handleShake);
            }
            modal.remove();
        }
    });
}

// ================= 上传小卡图片 =================
function uploadCardImage(type, index) {
    var fileInput = document.createElement("input");
    fileInput.type = "file";
    fileInput.accept = "image/*";
    fileInput.style.display = "none";
    document.body.appendChild(fileInput);

    fileInput.onchange = function(e) {
        var file = e.target.files[0];
        if (!file) return;

        if (file.size > 5 * 1024 * 1024) {
            alert("⚠️ 图片太大了，请选择小于5MB的图片");
            fileInput.remove();
            return;
        }

        var reader = new FileReader();
        reader.onload = function(ev) {
            var imageData = ev.target.result;

            // ✅ 修复：使用 currentCardSet 而不是 cardCollection
            if (currentCardSet && currentCardSet.cards) {
                currentCardSet.cards[type][index] = imageData;
                console.log('✅ 图片已保存到 currentCardSet.cards.' + type + '[' + index + ']');
            } else {
                console.error('❌ currentCardSet 未初始化或没有 cards 属性');
                alert('⚠️ 系统错误：请先打开一个卡套再上传图片');
                fileInput.remove();
                return;
            }

            // 更新界面
            var targetDiv = document.getElementById('card_' + type + '_' + index);
            if (targetDiv) {
                targetDiv.innerHTML = '<img src="' + imageData + '" style="width:100%;height:100%;object-fit:cover;border-radius:6px;">';
                targetDiv.style.background = "transparent";
                console.log('✅ 界面已更新');
            } else {
                console.error('❌ 找不到元素: card_' + type + '_' + index);
            }

            fileInput.remove();
        };

        reader.onerror = function(err) {
            console.error('❌ 文件读取失败:', err);
            alert('⚠️ 图片读取失败，请重试');
            fileInput.remove();
        };

        reader.readAsDataURL(file);
    };

    fileInput.oncancel = function() {
        fileInput.remove();
    };

    fileInput.click();
}

// ================= 保存卡套 =================
function saveCardSet() {
    // 获取名称
    var nameInput = document.getElementById("cardSetNameInput");
    if (nameInput) {
        currentCardSet.name = nameInput.value.trim() || "未命名卡套";
    }

    // 检查是否有任何图片
    var hasCard = false;
    var types = ['n', 'r', 'sr', 'ssr', 'sp'];
    types.forEach(function(type) {
        if (currentCardSet.cards && currentCardSet.cards[type]) {
            currentCardSet.cards[type].forEach(function(card) {
                if (card && card !== '') hasCard = true;
            });
        }
    });

    if (!hasCard) {
        if (!confirm("当前卡套没有任何图片，确定要保存吗？")) {
            return;
        }
    }

    // 先加载最新的数据，防止覆盖
    loadCardSets();

    // 如果是新建（没有 id 或者不在数组中）
    if (!currentCardSetId || !cardSets.find(function(s) { return s.id === currentCardSetId; })) {
        // 生成新 id
        if (!currentCardSet.id) {
            currentCardSet.id = "set_" + Date.now();
        }
        currentCardSet.createdAt = new Date().toLocaleString();
        // 添加到数组
        cardSets.push(currentCardSet);
        currentCardSetId = currentCardSet.id;
    } else {
        // 更新已有卡套
        var index = cardSets.findIndex(function(s) { return s.id === currentCardSetId; });
        if (index !== -1) {
            cardSets[index] = currentCardSet;
        } else {
            // 如果找不到，作为新卡套添加
            cardSets.push(currentCardSet);
            currentCardSetId = currentCardSet.id;
        }
    }

    saveCardSets();

    // 调试：打印保存后的数据
    console.log('保存后 cardSets 数量:', cardSets.length);
    console.log('保存后 cardSets 数据:', cardSets);

    alert("卡套已保存！");

    // 关闭弹窗
    var modal = document.querySelector(".full-modal");
    if (modal) modal.remove();

    // 重新打开设置列表
    setTimeout(function() {
        openCardSettings();
    }, 300);
}
// ================= 删除卡套 =================
function deleteCardSet() {
    if (!currentCardSetId) {
        // 新建的卡套，直接关闭
        var modal = document.querySelector(".full-modal");
        if (modal) modal.remove();
        return;
    }

    if (!confirm(`确定要删除「${currentCardSet.name || '未命名卡套'}」吗？`)) {
        return;
    }

    cardSets = cardSets.filter(function(s) { return s.id !== currentCardSetId; });
    saveCardSets();
    
    var modal = document.querySelector(".full-modal");
    if (modal) modal.remove();
    
    setTimeout(function() {
        openCardSettings();
    }, 300);
}

// ================= 加载小卡数据 =================
function loadCardSettings() {
    try {
        var saved = localStorage.getItem("cardCollection");
        if (saved) {
            var parsed = JSON.parse(saved);
            // 合并数据，保留结构
            if (parsed.name !== undefined) cardCollection.name = parsed.name;
            if (parsed.n) cardCollection.n = parsed.n;
            if (parsed.r) cardCollection.r = parsed.r;
            if (parsed.sr) cardCollection.sr = parsed.sr;
            if (parsed.ssr) cardCollection.ssr = parsed.ssr;
            if (parsed.sp) cardCollection.sp = parsed.sp;
        }
    } catch(e) {
        console.log("加载小卡数据失败:", e);
    }
}

        ];

    } else {

        if (!currentSelectedCardSet) {
            loadSelectedCardSet();
            if (!currentSelectedCardSet) {
                return { name: "未选择卡套", emoji: "🃏", desc: "⚠️ 请先在设置中选择一套卡！", isCard: false };
            }
        }

        var cards = currentSelectedCardSet.cards;
        
        var availableCards = {
            n: [],
            r: [],
            sr: [],
            ssr: [],
            sp: []
        };

        if (cards.n) {
            cards.n.forEach(function(card, idx) {
                if (card && card !== '') {
                    availableCards.n.push({ data: card, label: 'N' + (idx + 1), type: 'n' });
                }
            });
        }
        if (cards.r) {
            cards.r.forEach(function(card, idx) {
                if (card && card !== '') {
                    availableCards.r.push({ data: card, label: 'R' + (idx + 1), type: 'r' });
                }
            });
        }
        if (cards.sr) {
            cards.sr.forEach(function(card, idx) {
                if (card && card !== '') {
                    availableCards.sr.push({ data: card, label: 'SR' + (idx + 1), type: 'sr' });
                }
            });
        }
        if (cards.ssr) {
            cards.ssr.forEach(function(card, idx) {
                if (card && card !== '') {
                    availableCards.ssr.push({ data: card, label: 'SSR' + (idx + 1), type: 'ssr' });
                }
            });
        }
        if (cards.sp) {
            cards.sp.forEach(function(card, idx) {
                if (card && card !== '') {
                    availableCards.sp.push({ data: card, label: idx === 0 ? 'SP' : '隐藏款', type: 'sp', isHidden: idx === 1 });
                }
            });
        }

        var totalN = availableCards.n.length;
        var totalR = availableCards.r.length;
        var totalSR = availableCards.sr.length;
        var totalSSR = availableCards.ssr.length;
        var totalSP = availableCards.sp.length;

        if (totalN === 0 && totalR === 0 && totalSR === 0 && totalSSR === 0 && totalSP === 0) {
            return { name: "卡套为空", emoji: "🃏", desc: "⚠️ 这套卡还没有任何图片，请先上传！", isCard: false };
        }

        var rand = Math.random() * 100;
        var selectedCard = null;
        var rarityLabel = '';
        var isHidden = false;

        // 隐藏款 0.8%
        var hiddenCard = null;
        if (cards.sp && cards.sp[1] && cards.sp[1] !== '') {
            hiddenCard = { data: cards.sp[1], label: '🌟 隐藏款', type: 'sp', isHidden: true };
        }

        if (rand < 0.8 && hiddenCard) {
            selectedCard = hiddenCard;
            rarityLabel = '🌟 SP 隐藏款';
            isHidden = true;
        } else if (rand < 10 && totalSP > 0) {
            // SP 10%
            var spList = availableCards.sp.filter(function(c) { return !c.isHidden; });
            if (spList.length > 0) {
                var spIndex = Math.floor(Math.random() * spList.length);
                selectedCard = spList[spIndex];
                rarityLabel = '💎 SP';
            }
        }

        if (!selectedCard) {
            if (rand < 30 && totalN > 0) {
                var nIndex = Math.floor(Math.random() * availableCards.n.length);
                selectedCard = availableCards.n[nIndex];
                rarityLabel = 'N';
            } else if (rand < 55 && totalR > 0) {
                var rIndex = Math.floor(Math.random() * availableCards.r.length);
                selectedCard = availableCards.r[rIndex];
                rarityLabel = 'R';
            } else if (rand < 75 && totalSR > 0) {
                var srIndex = Math.floor(Math.random() * availableCards.sr.length);
                selectedCard = availableCards.sr[srIndex];
                rarityLabel = 'SR';
            } else if (rand < 90 && totalSSR > 0) {
                var ssrIndex = Math.floor(Math.random() * availableCards.ssr.length);

    if (result.moneyChange !== 0) {
        player.money = Math.max(0, player.money + result.moneyChange);

    renderMyPage();

    showResultModal("乞讨结果", result.text, infoLines);

function changeMomentsBg() {
    let fileInput = document.createElement("input");
    fileInput.type = "file";
    fileInput.accept = "image/*";
    fileInput.style.display = "none";
    document.body.appendChild(fileInput);
    
    fileInput.onchange = function(e) {
        let file = e.target.files[0];
        if (!file) return;
        if (file.size > 5 * 1024 * 1024) {
            alert("图片太大了，请选择小于5MB的图片");
            return;
        }
        let reader = new FileReader();
        reader.onload = function(ev) {
            let imageData = ev.target.result;
            localStorage.setItem("moments_bg", imageData);
            renderMoments();
            alert("✅ 朋友圈背景更换成功！");
        };
        reader.readAsDataURL(file);
        fileInput.remove();
    };
    fileInput.oncancel = function() {
        fileInput.remove();
    };
    fileInput.click();
}

// ================= 更换头像功能 =================
function changeAvatar() {
    let fileInput = document.createElement("input");
    fileInput.type = "file";
    fileInput.accept = "image/*";
    fileInput.style.display = "none";
    document.body.appendChild(fileInput);
    
    fileInput.onchange = function(e) {
        let file = e.target.files[0];
        if (!file) return;
        if (file.size > 5 * 1024 * 1024) {
            alert("图片太大了，请选择小于5MB的图片");
            return;
        }
        let reader = new FileReader();
        reader.onload = function(ev) {
            let imageData = ev.target.result;
            localStorage.setItem("player_avatar", imageData);
            renderMyPage();
            renderChatList();
            renderMoments();
            // 如果正在聊天中，刷新聊天消息
            if (currentChatContact && chatData[currentChatContact]) {
                renderChatMessages();
            }
            alert("✅ 头像更换成功！");
        };
        reader.readAsDataURL(file);
        fileInput.remove();
    };
    fileInput.oncancel = function() {
        fileInput.remove();
    };
    fileInput.click();
}

    if (avatar && (avatar.startsWith("data:image") || avatar.startsWith("blob:"))) {
        return avatar;
    }
    return "🐰";
}

function showGiftOptions(name) {
    let modal = document.createElement("div");
    modal.className = "full-modal";
    modal.innerHTML = `
        <div class="modal-header">
            <h3>🎁 送给 ${name}</h3>
            <button class="close-modal">×</button>
        </div>
        <div id="giftOptionsList"></div>
    `;
    document.body.appendChild(modal);
    
    let container = modal.querySelector("#giftOptionsList");
    
    const giftOptions = [
        { name: "鲜花", desc: "一束漂亮的鲜花", loveAdd: 5, cost: 10 },
        { name: "巧克力", desc: "手工巧克力礼盒", loveAdd: 8, cost: 15 },
        { name: "小熊玩偶", desc: "超大毛绒小熊", loveAdd: 12, cost: 25 },
        { name: "定制手链", desc: "刻名字的银手链", loveAdd: 15, cost: 30 }
    ];
    
    container.innerHTML = giftOptions.map(g => `
        <div style="display:flex; align-items:center; justify-content:space-between; padding:12px 0; border-bottom:1px solid #EFEFEF;">
            <div>
                <div style="font-weight:600;">${g.name}</div>
                <div style="font-size:12px; color:#666;">${g.desc}</div>
                <div style="font-size:11px; color:#999;">💰 ${g.cost} 余额 | ❤️ +${g.loveAdd}</div>
            </div>
            <button class="send-gift-btn" data-gift-name="${g.name}" data-love-add="${g.loveAdd}" data-cost="${g.cost}" style="background:#4CAF50; color:white; border:none; padding:6px 16px; border-radius:20px; cursor:pointer;">赠送</button>
        </div>
    `).join("");
    
    document.querySelectorAll(".send-gift-btn").forEach(btn => {
        btn.addEventListener("click", function() {
            let giftName = this.dataset.giftName;
            let loveAdd = parseInt(this.dataset.loveAdd);
            let cost = parseInt(this.dataset.cost);
            
            if (player.danger < cost) {
                alert(`余额不足！需要 ${cost} 余额，当前只有 ${player.danger}`);
                return;
            }
            
            // 扣余额
            player.danger -= cost;
            // 加好感（这里加的是智慧值，因为爱意已改名为智慧）
            player.love += loveAdd;
            
            // 记录送礼记录到礼物系统
            gifts.push({
                name: `送给 ${name} 的${giftName}`,
                desc: `${name} 收到礼物后好感度 +${loveAdd}`
            });
            
            renderMyPage();
            modal.remove();
            alert(`✅ 成功送给 ${name} ${giftName}！\n❤️ 好感度 +${loveAdd}\n💰 余额 -${cost}`);
        });
    });
    
    modal.querySelector(".close-modal").onclick = () => modal.remove();
}

    let usedMeetIndices = [];  // 已使用过的偶遇事件索引
    
    // 获取随机未使用的偶遇事件
    function getRandomMeetEvent() {
        if (usedMeetIndices.length >= meetEvents.length) {
            // 如果全部用完了，重置
            usedMeetIndices = [];
        }
        let availableIndices = [];
        for (let i = 0; i < meetEvents.length; i++) {
            if (!usedMeetIndices.includes(i)) {
                availableIndices.push(i);
            }
        }
        let randomIndex = availableIndices[Math.floor(Math.random() * availableIndices.length)];
        usedMeetIndices.push(randomIndex);
        return meetEvents[randomIndex];
    }
    
    // 重置偶遇事件（每章开始时调用）
    function resetMeetEvents() {
        usedMeetIndices = [];
        meetCount = 0;
    }

           function addMoment() {
        let modal = document.createElement("div");
        modal.className = "full-modal";
        modal.innerHTML = `<div class="modal-header"><h3>发布朋友圈</h3><button class="close-modal">×</button></div>`;
        
        let optionsHtml = `<div style="margin-top:12px;">`;
        publishOptions.forEach((opt, idx) => {
            optionsHtml += `<button class="moment-publish-btn" data-idx="${idx}" style="background:#F8F8F8; border:none; padding:12px; border-radius:16px; margin:8px 0; width:100%; text-align:left; cursor:pointer;">${opt.text}</button>`;
        });
        optionsHtml += `</div>`;
        modal.innerHTML += optionsHtml;
        document.body.appendChild(modal);
        
        document.querySelectorAll(".moment-publish-btn").forEach(btn => {
            btn.addEventListener("click", () => {
                let idx = parseInt(btn.dataset.idx);
                let selected = publishOptions[idx];
                
                // 创建新朋友圈
                let newMoment = {
                    id: "my_" + Date.now(),
                    author: player.name,
                    avatar: "🐰",
                    time: new Date().toLocaleString(),
                    content: selected.text,
                    likes: [],  // 初始无点赞
                    comments: []
                };
                
                myMoments.unshift(newMoment);
                momentsData.unshift(newMoment);
                renderMoments();
                modal.remove();
                
                // 5秒后出现点赞和评论
                setTimeout(() => {
                    // 张桂源自动点赞
                    if (!newMoment.likes.includes("张桂源")) {
                        newMoment.likes.push("张桂源");
                    }
                    // 添加评论
                    selected.replies.forEach(reply => {
                        newMoment.comments.push({ author: reply.author, text: reply.text });
                    });
                    renderMoments();
                }, 5000);
            });
        });
        
        modal.querySelector(".close-modal").onclick = () => modal.remove();
    }

            avatar: "zqhwx.jpg",
            note: "哎呀~有点好奇"
        }
    ];
    
    // 同步添加到好友申请列表
    for (let req of requests) {
        let exists = friendRequests.some(f => f.name === req.name);

            friendRequests.push({
                name: req.name,
                avatar: req.avatar,
                intro: req.note
            });
        }
    }
    // 只添加不存在的申请

        let exists = friendRequests.some(f => f.name === req.name);

            friendRequests.push({
                name: req.name,

                intro: req.note
            });

// ================= 小卡存储系统 =================
// 存储抽到的小卡
let myCards = [];

// 加载小卡数据
function loadMyCards() {
    try {
        var saved = localStorage.getItem("myCards");
        if (saved) {
            myCards = JSON.parse(saved);
        } else {
            myCards = [];
        }
    } catch(e) {
        myCards = [];
    }
}

// 保存小卡数据
function saveMyCards() {
    try {
        localStorage.setItem("myCards", JSON.stringify(myCards));
    } catch(e) {
        console.log("保存小卡数据失败:", e);
    }
}

// 获取我的小卡
function getMyCards() {
    loadMyCards();
    return myCards;
}

// 添加小卡
function addMyCard(cardData) {
    loadMyCards();
    myCards.push({
        id: "card_" + Date.now() + "_" + Math.random().toString(36).substr(2, 6),
        imageData: cardData.imageData,
        setName: cardData.setName || '未命名卡套',
        rarity: cardData.rarity || 'N',
        rarityLabel: cardData.rarityLabel || 'N',
        cardLabel: cardData.cardLabel || '',
        isHidden: cardData.isHidden || false,
        obtainedAt: new Date().toLocaleString()
    });
    saveMyCards();
}

// 删除小卡（出售或赠送后移除）
function removeMyCard(index) {
    loadMyCards();
    if (index >= 0 && index < myCards.length) {
        myCards.splice(index, 1);
        saveMyCards();
        return true;
    }
    return false;
}

function executeGift(index, target) {
    loadMyCards();
    if (index < 0 || index >= myCards.length) {
        showResultModal("提示", "小卡不存在", function() {
            refreshGiftsContent();
        });
        return;
    }

    var card = myCards[index];

    // 检查目标是否在黑名单中（不能赠送给自己）
    if (target === '路人') {
        // 送给路人：随机事件
        var random = Math.random();
        var resultMsg = '';
        var loveAdd = 0;
        var success = true;

        if (random < 0.3) {
            resultMsg = '路人：这是什么？看起来像一张废纸，随手丢掉了。';
            loveAdd = 0;
            success = false;
        } else if (random < 0.6) {
            resultMsg = '路人：哇！好漂亮的小卡！谢谢你！（路人非常开心）';
            loveAdd = 1;
            success = true;
        } else if (random < 0.9) {
            resultMsg = '路人：谢谢！我会好好珍藏的！';
            loveAdd = 2;
            success = true;
        } else {
            resultMsg = '路人：你人真好！这张卡我会一直保存的！';
            loveAdd = 3;
            success = true;
        }

        if (success) {
            myCards.splice(index, 1);
            saveMyCards();
            player.love = Math.min(100, (player.love || 0) + loveAdd);
            renderMyPage();
            showResultModal('赠送成功', resultMsg + '\n好感度 +' + loveAdd, function() {
                refreshGiftsContent();
            });
        } else {
            // 路人丢掉了，小卡损失，但没有好感度
            myCards.splice(index, 1);
            saveMyCards();
            renderMyPage();
            showResultModal('赠送失败', resultMsg, function() {
                refreshGiftsContent();
            });
        }
        return;
    }

    if (target === '李飞') {
        // 邮寄给李飞：特殊事件
        var random = Math.random();
        var resultMsg = '';
        var loveAdd = 0;

        if (random < 0.2) {
            resultMsg = '李飞：已收到，放在仓库积灰了。';
            loveAdd = 0;
        } else if (random < 0.5) {
            resultMsg = '李飞：不错，有点意思。';
            loveAdd = 3;
        } else if (random < 0.8) {
            resultMsg = '李飞：很有心意，加油练习！';
            loveAdd = 5;
        } else {
            resultMsg = '李飞：这张卡很稀有！我会好好收藏的！';
            loveAdd = 8;
        }

        myCards.splice(index, 1);
        saveMyCards();
        player.love = Math.min(100, (player.love || 0) + loveAdd);
        renderMyPage();
        showResultModal('邮寄成功', '已邮寄给李飞\n' + resultMsg + '\n好感度 +' + loveAdd, function() {
            refreshGiftsContent();
        });
        return;
    }

    // 送给指定人物（左奇函、张桂源、陈浚铭、张函瑞、WXYz）
    // 不同人物有不同的好感度加成
    var loveMap = {
        '左奇函': 5,
        '张桂源': 10,
        '陈浚铭': 6,
        '张函瑞': 6,
        'WXYz': 4
    };

    var baseLove = loveMap[target] || 5;

    // 根据稀有度增加额外好感
    var rarityBonus = {
        'N': 0,
        'R': 2,
        'SR': 5,
        'SSR': 8,
        'SP': 12
    };
    var bonus = rarityBonus[card.rarity] || 0;

    // 隐藏款额外加成
    if (card.isHidden === true) {
        bonus += 15;
    }

    var totalLove = baseLove + bonus;

    // 随机小事件
    var eventMessages = [
        target + '：哇！这张卡好棒！谢谢你！',
        target + '：你从哪里弄到的？太喜欢了！',

        target + '：谢谢你，我很开心！',
        target + '：这张卡太帅了吧！爱了爱了！'
    ];
    var eventMsg = eventMessages[Math.floor(Math.random() * eventMessages.length)];

    myCards.splice(index, 1);

    player.love = Math.min(100, (player.love || 0) + totalLove);
    renderMyPage();

    showResultModal('赠送成功', '送给 ' + target + '\n' + eventMsg + '\n好感度 +' + totalLove, function() {

            success = false;
            title = '出售失败';
        } else {
            earnedMoney = basePrice;
            resultMsg = '与买家顺利完成交易';
            success = true;
            title = '出售成功';
        }
    } else if (method === 'lvpaopao') {
        if (random < 0.5) {
            resultMsg = '与买家交谈甚欢，第二天收到了红色感叹号，出售失败';
            earnedMoney = 0;
            success = false;
            title = '出售失败';
        } else {
            earnedMoney = basePrice;
            resultMsg = '与买家顺利完成交易';
            success = true;
            title = '出售成功';
        }
    } else if (method === 'xiaohuangyu') {
        if (random < 0.2) {
            earnedMoney = Math.floor(basePrice * 0.5);
            resultMsg = '遭遇了大刀特刀，以售价的50%成交';
            success = true;
            title = '出售成功';
        } else if (random < 0.4) {
            earnedMoney = Math.floor(basePrice * 0.8);
            resultMsg = '遭到了小刀，以售价的80%成交';
            success = true;
            title = '出售成功';
        } else if (random < 0.6) {
            earnedMoney = Math.floor(basePrice * 0.9);
            resultMsg = '与买家相谈甚欢，给了对方优惠，以售价的90%成交';
            success = true;
            title = '出售成功';
        } else if (random < 0.8) {
            earnedMoney = Math.floor(basePrice * 1.2);
            resultMsg = '遇到了富婆，以售价的120%成交';
            success = true;
            title = '出售成功';
        } else {
            earnedMoney = 0;
            resultMsg = '遇到了ysg，小卡被白嫖了';
            success = false;
            title = '出售失败';
        }
    }

    // ✅ 关键：执行出售结果
    var detailMsg = '';

    if (success) {
        // ✅ 1. 移除小卡
        myCards.splice(index, 1);
        saveMyCards();

        // ✅ 2. 增加金钱到余额
        player.money = (player.money || 0) + earnedMoney;
        renderMyPage();

        detailMsg = '获得金钱：' + earnedMoney;
        showResultModal(title, resultMsg + '\n' + detailMsg, function() {
            refreshGiftsContent();
        });
    } else {
        if (earnedMoney < 0) {
            // 损失金钱（从余额扣除）
            player.money = Math.max(0, (player.money || 0) + earnedMoney);
            renderMyPage();
            detailMsg = '损失金钱：' + Math.abs(earnedMoney);
            showResultModal(title, resultMsg + '\n' + detailMsg, function() {
                refreshGiftsContent();
            });
        } else if (earnedMoney === 0 && resultMsg.includes('ysg')) {
            // ✅ ysg 只损失小卡，不扣钱（移除小卡）
            myCards.splice(index, 1);
            saveMyCards();
            renderMyPage();
            showResultModal(title, resultMsg, function() {
                refreshGiftsContent();
            });
        } else {
            // 出售失败，小卡保留
            showResultModal(title, resultMsg, function() {
                refreshGiftsContent();
            });
        }
    }
}
